<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* NAVBAR */

        .navbar {

            background: #111827;
            color: white;

            padding: 20px 40px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {

            font-size: 24px;
            font-weight: bold;
        }

        .nav-links a {

            color: white;
            text-decoration: none;

            margin-left: 20px;
        }

        .nav-links a:hover {

            color: #60a5fa;
        }

        .logout-btn {

            background: #ef4444;
            color: white;

            border: none;

            padding: 10px 16px;

            border-radius: 8px;

            cursor: pointer;
        }

        .logout-btn:hover {

            background: #dc2626;
        }

        /* PAGE */

        .container {

            max-width: 1200px;

            margin: 40px auto;
            padding: 20px;
        }

        h1 {

            margin-bottom: 30px;
            color: #111827;
        }

        /* EVENT CARDS */

        .events-grid {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(320px, 1fr));

            gap: 25px;
        }

        .event-card {

            background: white;

            padding: 25px;

            border-radius: 16px;

            box-shadow:
                0 8px 24px rgba(0,0,0,0.1);
        }

        .event-card h2 {

            margin-bottom: 15px;
            color: #111827;
        }

        .event-card p {

            margin-bottom: 10px;
            color: #444;
        }

        .status {

            display: inline-block;

            background: #fbbf24;
            color: #111827;

            padding: 6px 12px;

            border-radius: 20px;

            font-size: 14px;

            margin-top: 10px;
            margin-bottom: 15px;
        }

        .approve-btn {

            background: #16a34a;
            color: white;

            border: none;

            padding: 12px 18px;

            border-radius: 8px;

            cursor: pointer;
        }

        .approve-btn:hover {

            background: #15803d;
        }
        .reject-btn {

    background: #dc2626;
    color: white;

    border: none;

    padding: 12px 18px;

    border-radius: 8px;

    cursor: pointer;

            margin-left: 10px;
        }

        .reject-btn:hover {

            background: #b91c1c;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">
        Cresco Admin
    </div>

    <div class="nav-links">

        <a href="registrations.html">
            Registrations
        </a>

        <button
            class="logout-btn"
            onclick="logout()"
        >
            Logout
        </button>

    </div>

</div>

<!-- CONTENT -->

<div class="container">

    <h1>Pending Event Approvals</h1>

    <div
        class="events-grid"
        id="eventsContainer"
    ></div>

</div>

<script>

// TOKEN CHECK

const token = localStorage.getItem("token");

if (!token) {

    alert("Please login first");

    window.location.href =
        "admin-login.html";
}


// LOGOUT

function logout() {

    localStorage.removeItem("token");

    alert("Logged out successfully");

    window.location.href =
        "admin-login.html";
}


// LOAD PENDING EVENTS

async function loadPendingEvents() {

    const response = await fetch(
        "http://127.0.0.1:8000/all-events"
    );

    const events = await response.json();

    const container =
        document.getElementById("eventsContainer");

    container.innerHTML = "";

    const pendingEvents = events.filter(
        event => event.status === "Pending"
    );

    pendingEvents.forEach(event => {

        container.innerHTML += `

            <div class="event-card">

                <h2>${event.event_name}</h2>

                <p>
                    📅 ${event.event_date}
                </p>

                <p>
                    📍 ${event.event_location}
                </p>

                <span class="status">
                    ${event.status}
                </span>

                <br>

                <button
                    class="approve-btn"
                    onclick="approveEvent(${event.id})"
                >
                    Approve Event
                </button>
                <button
                    class="reject-btn"
                    onclick="rejectEvent(${event.id})"
                >
                    Reject Event
                </button>

            </div>

        `;
    });
}


// APPROVE EVENT

async function approveEvent(eventId) {

    const response = await fetch(
        `http://127.0.0.1:8000/approve-event/${eventId}`,
        {

            method: "PUT",

            headers: {

                "Authorization":
                    `Bearer ${token}`
            }
        }
    );

    const result = await response.json();

    alert(result.message);

    loadPendingEvents();
}

async function rejectEvent(eventId) {

    const confirmReject = confirm(
        "Are you sure you want to reject this event?"
    );

    if (!confirmReject) {
        return;
    }

    const response = await fetch(

        `http://127.0.0.1:8000/reject-event/${eventId}`,

        {

            method: "DELETE",

            headers: {

                "Authorization":
                    `Bearer ${token}`
            }
        }
    );

    const result = await response.json();

    alert(result.message);

    loadPendingEvents();
}


// INITIAL LOAD

loadPendingEvents();

</script>

</body>
</html>
