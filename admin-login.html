<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #1e3a8a,
                    #2563eb
                );

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {

            background: white;

            width: 400px;

            padding: 40px;

            border-radius: 16px;

            box-shadow:
                0 8px 24px rgba(0,0,0,0.2);
        }

        .login-container h1 {

            text-align: center;

            margin-bottom: 30px;

            color: #111827;
        }

        input {

            width: 100%;

            padding: 14px;

            margin-bottom: 20px;

            border: 1px solid #ccc;

            border-radius: 8px;

            font-size: 16px;
        }

        button {

            width: 100%;

            padding: 14px;

            background: #2563eb;

            color: white;

            border: none;

            border-radius: 8px;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            background: #1d4ed8;
        }

        .back-link {

            text-align: center;

            margin-top: 20px;
        }

        .back-link a {

            text-decoration: none;
            color: #2563eb;
        }

    </style>

</head>

<body>

<div class="login-container">

    <h1>Admin Login</h1>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <div class="back-link">

        <a href="events.html">
            ← Back to Events
        </a>

    </div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", async function(e) {

    e.preventDefault();

    const data = {

        username:
            document.getElementById("username").value,

        password:
            document.getElementById("password").value
    };

    const response = await fetch(
        "http://127.0.0.1:8000/login",
        {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(data)
        }
    );

    const result = await response.json();

    if (result.access_token) {

        localStorage.setItem(
            "token",
            result.access_token
        );

        alert("Login Successful!");

        window.location.href = "admin.html";

    }

    else {

        alert("Invalid Login");

    }

});

</script>

</body>
</html>
